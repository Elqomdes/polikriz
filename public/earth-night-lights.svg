<svg width="4096" height="2048" viewBox="0 0 4096 2048" xmlns="http://www.w3/2000/svg">
  <defs>
    <!-- City light gradients -->
    <radialGradient id="majorCity" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffff88;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#ffaa44;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#ff6600;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="cityLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ffaa00;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ff4400;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="smallCity" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffaa;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#ffaa44;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="4096" height="2048" fill="#000011"/>
  
  <!-- Major metropolitan areas -->
  <!-- North America -->
  <circle cx="500" cy="400" r="25" fill="url(#majorCity)"/> <!-- New York -->
  <circle cx="300" cy="350" r="20" fill="url(#majorCity)"/> <!-- Los Angeles -->
  <circle cx="400" cy="300" r="18" fill="url(#majorCity)"/> <!-- Chicago -->
  <circle cx="600" cy="450" r="15" fill="url(#majorCity)"/> <!-- Toronto -->
  <circle cx="200" cy="500" r="12" fill="url(#majorCity)"/> <!-- Mexico City -->
  
  <!-- Europe -->
  <circle cx="2000" cy="400" r="22" fill="url(#majorCity)"/> <!-- London -->
  <circle cx="2100" cy="450" r="20" fill="url(#majorCity)"/> <!-- Paris -->
  <circle cx="2200" cy="400" r="18" fill="url(#majorCity)"/> <!-- Berlin -->
  <circle cx="1900" cy="500" r="15" fill="url(#majorCity)"/> <!-- Madrid -->
  <circle cx="2150" cy="500" r="16" fill="url(#majorCity)"/> <!-- Rome -->
  <circle cx="1800" cy="350" r="14" fill="url(#majorCity)"/> <!-- Moscow -->
  
  <!-- Asia -->
  <circle cx="3000" cy="400" r="28" fill="url(#majorCity)"/> <!-- Tokyo -->
  <circle cx="2800" cy="500" r="25" fill="url(#majorCity)"/> <!-- Shanghai -->
  <circle cx="2700" cy="450" r="20" fill="url(#majorCity)"/> <!-- Beijing -->
  <circle cx="2600" cy="550" r="18" fill="url(#majorCity)"/> <!-- Mumbai -->
  <circle cx="2900" cy="600" r="16" fill="url(#majorCity)"/> <!-- Singapore -->
  <circle cx="3200" cy="450" r="15" fill="url(#majorCity)"/> <!-- Seoul -->
  
  <!-- Africa -->
  <circle cx="2000" cy="700" r="12" fill="url(#majorCity)"/> <!-- Cairo -->
  <circle cx="1800" cy="800" r="10" fill="url(#majorCity)"/> <!-- Lagos -->
  <circle cx="2100" cy="900" r="8" fill="url(#majorCity)"/> <!-- Johannesburg -->
  <circle cx="1900" cy="750" r="9" fill="url(#majorCity)"/> <!-- Nairobi -->
  
  <!-- South America -->
  <circle cx="800" cy="800" r="15" fill="url(#majorCity)"/> <!-- São Paulo -->
  <circle cx="700" cy="900" r="12" fill="url(#majorCity)"/> <!-- Buenos Aires -->
  <circle cx="750" cy="750" r="10" fill="url(#majorCity)"/> <!-- Rio de Janeiro -->
  
  <!-- Australia -->
  <circle cx="3500" cy="1100" r="12" fill="url(#majorCity)"/> <!-- Sydney -->
  <circle cx="3400" cy="1150" r="10" fill="url(#majorCity)"/> <!-- Melbourne -->
  
  <!-- Major city clusters -->
  <g fill="url(#cityLight)">
    <!-- East Coast USA -->
    <circle cx="450" cy="420" r="8"/>
    <circle cx="480" cy="400" r="6"/>
    <circle cx="520" cy="430" r="7"/>
    <circle cx="550" cy="410" r="5"/>
    
    <!-- West Coast USA -->
    <circle cx="250" cy="380" r="6"/>
    <circle cx="280" cy="400" r="5"/>
    <circle cx="320" cy="420" r="7"/>
    <circle cx="350" cy="380" r="4"/>
    
    <!-- Western Europe -->
    <circle cx="1950" cy="420" r="6"/>
    <circle cx="1980" cy="450" r="5"/>
    <circle cx="2020" cy="430" r="7"/>
    <circle cx="2050" cy="460" r="4"/>
    
    <!-- Eastern Europe -->
    <circle cx="1850" cy="380" r="5"/>
    <circle cx="1880" cy="400" r="4"/>
    <circle cx="1920" cy="420" r="6"/>
    
    <!-- East Asia -->
    <circle cx="2950" cy="420" r="8"/>
    <circle cx="2980" cy="450" r="6"/>
    <circle cx="3020" cy="430" r="7"/>
    <circle cx="3050" cy="460" r="5"/>
    
    <!-- South Asia -->
    <circle cx="2650" cy="480" r="6"/>
    <circle cx="2680" cy="500" r="5"/>
    <circle cx="2720" cy="520" r="7"/>
    <circle cx="2750" cy="540" r="4"/>
  </g>
  
  <!-- Smaller urban areas -->
  <g fill="url(#smallCity)">
    <!-- North America small cities -->
    <circle cx="350" cy="300" r="3"/>
    <circle cx="450" cy="350" r="2"/>
    <circle cx="550" cy="300" r="3"/>
    <circle cx="400" cy="500" r="2"/>
    <circle cx="500" cy="550" r="3"/>
    <circle cx="600" cy="500" r="2"/>
    
    <!-- Europe small cities -->
    <circle cx="1750" cy="350" r="3"/>
    <circle cx="1850" cy="400" r="2"/>
    <circle cx="1950" cy="450" r="3"/>
    <circle cx="2050" cy="500" r="2"/>
    <circle cx="2150" cy="350" r="3"/>
    <circle cx="2250" cy="400" r="2"/>
    
    <!-- Asia small cities -->
    <circle cx="2500" cy="350" r="3"/>
    <circle cx="2600" cy="400" r="2"/>
    <circle cx="2700" cy="450" r="3"/>
    <circle cx="2800" cy="500" r="2"/>
    <circle cx="2900" cy="550" r="3"/>
    <circle cx="3000" cy="600" r="2"/>
    <circle cx="3100" cy="500" r="3"/>
    <circle cx="3200" cy="550" r="2"/>
    
    <!-- Africa small cities -->
    <circle cx="1700" cy="600" r="2"/>
    <circle cx="1800" cy="650" r="3"/>
    <circle cx="1900" cy="700" r="2"/>
    <circle cx="2000" cy="750" r="3"/>
    <circle cx="2100" cy="800" r="2"/>
    <circle cx="2200" cy="850" r="3"/>
    
    <!-- South America small cities -->
    <circle cx="650" cy="700" r="2"/>
    <circle cx="750" cy="750" r="3"/>
    <circle cx="850" cy="800" r="2"/>
    <circle cx="650" cy="850" r="3"/>
    <circle cx="750" cy="900" r="2"/>
    
    <!-- Australia small cities -->
    <circle cx="3300" cy="1000" r="2"/>
    <circle cx="3400" cy="1050" r="3"/>
    <circle cx="3500" cy="1100" r="2"/>
    <circle cx="3600" cy="1150" r="3"/>
  </g>
  
  <!-- Highway and road networks (represented as connected lights) -->
  <g stroke="#ffaa44" stroke-width="1" fill="none" opacity="0.4">
    <!-- Trans-Siberian Railway -->
    <path d="M1800,300 L2000,320 L2200,340 L2400,360 L2600,380 L2800,400 L3000,420"/>
    
    <!-- US Interstate System -->
    <path d="M200,400 L300,420 L400,440 L500,460 L600,480"/>
    <path d="M300,300 L400,320 L500,340 L600,360 L700,380"/>
    
    <!-- European road network -->
    <path d="M1800,400 L1900,420 L2000,440 L2100,460 L2200,480"/>
    <path d="M1900,350 L2000,370 L2100,390 L2200,410 L2300,430"/>
    
    <!-- Asian highway network -->
    <path d="M2500,500 L2600,520 L2700,540 L2800,560 L2900,580 L3000,600"/>
  </g>
  
  <!-- Oil and gas fields (represented as industrial lights) -->
  <g fill="#ff6600" opacity="0.6">
    <!-- Middle East -->
    <circle cx="2200" cy="600" r="4"/>
    <circle cx="2250" cy="620" r="3"/>
    <circle cx="2300" cy="640" r="4"/>
    <circle cx="2350" cy="620" r="3"/>
    
    <!-- North Sea -->
    <circle cx="1900" cy="300" r="3"/>
    <circle cx="1950" cy="320" r="2"/>
    
    <!-- Gulf of Mexico -->
    <circle cx="400" cy="500" r="3"/>
    <circle cx="450" cy="520" r="2"/>
    
    <!-- Siberia -->
    <circle cx="2500" cy="250" r="3"/>
    <circle cx="2550" cy="270" r="2"/>
  </g>
</svg>
