<svg width="4096" height="2048" viewBox="0 0 4096 2048" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Normal map gradients for different elevations -->
    <linearGradient id="oceanNormal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8080ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8080ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lowlandNormal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8080ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8080ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="highlandNormal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8080ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8080ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mountainNormal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8080ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8080ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ocean areas - flat normal -->
  <rect width="4096" height="2048" fill="url(#oceanNormal)"/>
  
  <!-- Continental areas with varying elevation -->
  <!-- North America -->
  <g fill="url(#lowlandNormal)">
    <path d="M200,200 L350,180 L450,200 L500,250 L480,300 L400,320 L300,300 L250,250 L200,220 Z"/>
    <path d="M300,250 L600,220 L700,280 L720,350 L680,420 L600,450 L500,430 L400,400 L350,350 L300,300 Z"/>
    <path d="M400,400 L700,380 L750,450 L720,520 L650,550 L550,540 L480,500 L420,450 L400,400 Z"/>
  </g>
  
  <!-- Mountain ranges with high elevation normals -->
  <g fill="url(#mountainNormal)">
    <!-- Himalayas -->
    <path d="M2500,500 L2800,490 L2850,520 L2800,550 L2500,560 L2450,530 Z"/>
    <!-- Andes -->
    <path d="M700,800 L720,780 L740,800 L720,820 L700,800 Z"/>
    <!-- Rockies -->
    <path d="M300,350 L400,340 L420,370 L400,400 L350,410 L300,380 Z"/>
    <!-- Alps -->
    <path d="M1900,400 L2000,395 L2020,420 L2000,450 L1950,455 L1900,430 Z"/>
    <!-- Ural Mountains -->
    <path d="M2200,300 L2400,290 L2420,320 L2400,350 L2300,360 L2200,340 Z"/>
  </g>
  
  <!-- High elevation areas -->
  <g fill="url(#highlandNormal)">
    <!-- Tibetan Plateau -->
    <path d="M2600,400 L3000,380 L3100,450 L3000,500 L2800,520 L2600,500 Z"/>
    <!-- Colorado Plateau -->
    <path d="M350,400 L450,390 L470,420 L450,450 L400,460 L350,440 Z"/>
    <!-- Deccan Plateau -->
    <path d="M2500,550 L2700,540 L2750,580 L2700,620 L2600,630 L2500,620 Z"/>
  </g>
</svg>
