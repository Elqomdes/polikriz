<svg width="2048" height="1024" viewBox="0 0 2048 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Night lights gradient -->
    <radialGradient id="cityLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#ffaa00;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="2048" height="1024" fill="#000011"/>
  
  <!-- Major cities and urban areas -->
  <!-- North America -->
  <circle cx="300" cy="250" r="8" fill="url(#cityLight)"/>
  <circle cx="350" cy="280" r="6" fill="url(#cityLight)"/>
  <circle cx="400" cy="300" r="7" fill="url(#cityLight)"/>
  <circle cx="320" cy="320" r="5" fill="url(#cityLight)"/>
  <circle cx="280" cy="350" r="4" fill="url(#cityLight)"/>
  
  <!-- Europe -->
  <circle cx="900" cy="250" r="6" fill="url(#cityLight)"/>
  <circle cx="850" cy="280" r="5" fill="url(#cityLight)"/>
  <circle cx="950" cy="300" r="7" fill="url(#cityLight)"/>
  <circle cx="800" cy="320" r="4" fill="url(#cityLight)"/>
  <circle cx="1000" cy="280" r="5" fill="url(#cityLight)"/>
  
  <!-- Asia -->
  <circle cx="1200" cy="250" r="8" fill="url(#cityLight)"/>
  <circle cx="1300" cy="280" r="6" fill="url(#cityLight)"/>
  <circle cx="1400" cy="300" r="7" fill="url(#cityLight)"/>
  <circle cx="1100" cy="320" r="5" fill="url(#cityLight)"/>
  <circle cx="1500" cy="280" r="6" fill="url(#cityLight)"/>
  <circle cx="1250" cy="350" r="4" fill="url(#cityLight)"/>
  <circle cx="1350" cy="380" r="5" fill="url(#cityLight)"/>
  
  <!-- Africa -->
  <circle cx="850" cy="400" r="4" fill="url(#cityLight)"/>
  <circle cx="900" cy="450" r="3" fill="url(#cityLight)"/>
  <circle cx="950" cy="500" r="4" fill="url(#cityLight)"/>
  <circle cx="800" cy="550" r="3" fill="url(#cityLight)"/>
  <circle cx="1000" cy="600" r="4" fill="url(#cityLight)"/>
  
  <!-- South America -->
  <circle cx="380" cy="500" r="5" fill="url(#cityLight)"/>
  <circle cx="400" cy="550" r="4" fill="url(#cityLight)"/>
  <circle cx="350" cy="600" r="3" fill="url(#cityLight)"/>
  
  <!-- Australia -->
  <circle cx="1500" cy="650" r="4" fill="url(#cityLight)"/>
  <circle cx="1550" cy="680" r="3" fill="url(#cityLight)"/>
  
  <!-- Smaller urban areas -->
  <g fill="url(#cityLight)" opacity="0.6">
    <!-- North America small cities -->
    <circle cx="250" cy="200" r="2"/>
    <circle cx="450" cy="250" r="2"/>
    <circle cx="300" cy="400" r="2"/>
    <circle cx="500" cy="350" r="2"/>
    
    <!-- Europe small cities -->
    <circle cx="750" cy="200" r="2"/>
    <circle cx="1050" cy="250" r="2"/>
    <circle cx="800" cy="400" r="2"/>
    <circle cx="1100" cy="350" r="2"/>
    
    <!-- Asia small cities -->
    <circle cx="1000" cy="200" r="2"/>
    <circle cx="1600" cy="250" r="2"/>
    <circle cx="1000" cy="400" r="2"/>
    <circle cx="1700" cy="350" r="2"/>
    <circle cx="1200" cy="500" r="2"/>
    <circle cx="1300" cy="550" r="2"/>
    
    <!-- Africa small cities -->
    <circle cx="700" cy="400" r="2"/>
    <circle cx="1100" cy="450" r="2"/>
    <circle cx="750" cy="500" r="2"/>
    <circle cx="1050" cy="550" r="2"/>
    
    <!-- South America small cities -->
    <circle cx="300" cy="450" r="2"/>
    <circle cx="450" cy="500" r="2"/>
    <circle cx="320" cy="650" r="2"/>
  </g>
</svg>
